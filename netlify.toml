[build]
  base = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/slack/webhook"
  to = "/.netlify/functions/slack_webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200
  force = true

# Serve static assets as files (must come before SPA fallback)
# Prevents /assets/*.js and other build outputs from being rewritten to index.html
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Serve sitemap.xml and robots.txt as real files (SEO/crawlers)
# Must come before SPA fallback or they get rewritten to index.html
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Security headers for frontend (CSP, HSTS, etc.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.stripe.com https://api.p3lending.space https://*.netlify.app wss: https:; frame-src 'self' https://*.stripe.com https://js.stripe.com https://*.stripe.net; object-src 'none'; base-uri 'self'; form-action 'self' https:"

# Handle Single Page Application (SPA) Routing (must be last)
# Routes like /profile or /lend get index.html on refresh; static assets already matched above
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
