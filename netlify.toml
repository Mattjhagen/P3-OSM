[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/slack/webhook"
  to = "/.netlify/functions/slack_webhook"
  status = 200
  force = true

# Handle Single Page Application (SPA) Routing
# This ensures that routes like /profile or /lend don't return 404 on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
